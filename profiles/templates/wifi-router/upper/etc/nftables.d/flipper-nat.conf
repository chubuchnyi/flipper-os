# Flipper OS WiFi Router — NAT/masquerade rules
# Profile: wifi-router
#
# Loaded by nftables.service via /etc/nftables.conf include directive.
# Assumes wlan0 = AP interface (LAN), usb0/eth0 = uplink (WAN).

table ip flipper_nat {
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;
        # Masquerade traffic from AP subnet going out via uplink
        ip saddr 192.168.4.0/24 oifname != "wlan0" masquerade
    }

    chain forward {
        type filter hook forward priority filter; policy accept;
        # Allow established/related connections back
        ct state established,related accept
        # Allow LAN → WAN
        iifname "wlan0" accept
    }
}
