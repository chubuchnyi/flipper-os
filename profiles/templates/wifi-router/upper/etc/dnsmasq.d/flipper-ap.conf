# Flipper OS WiFi Router — dnsmasq DHCP/DNS configuration
# Profile: wifi-router

interface=wlan0
bind-interfaces

# DHCP range: 192.168.4.10 — 192.168.4.200, 24h lease
dhcp-range=192.168.4.10,192.168.4.200,255.255.255.0,24h

# Gateway and DNS
dhcp-option=option:router,192.168.4.1
dhcp-option=option:dns-server,192.168.4.1

# Upstream DNS (systemd-resolved stub)
server=127.0.0.53
