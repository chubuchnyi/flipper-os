name: Build Flipper OS

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      board:
        description: Target board
        default: rock-4d
        type: choice
        options:
          - rock-4d

# Cancel previous run on the same branch when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # ─── Job 1: Build Docker build environment ──────────────────────────────────
  #
  # Produces an image with all dependencies pre-installed (APT packages,
  # cross-toolchain, Rust, cloned upstream repos, kernel source).
  # Heavily cached in GHCR — only the COPY layer changes on source edits.
  build-env:
    name: Build environment image
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.image.outputs.ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR requires lowercase image names
      - name: Compute image reference
        id: image
        run: |
          REPO="$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          echo "ref=${{ env.REGISTRY }}/${REPO}/build-env:${{ github.sha }}"  >> "$GITHUB_OUTPUT"
          echo "cache=${{ env.REGISTRY }}/${REPO}/build-env:buildcache"       >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push environment image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.ref }}
          # Registry cache: read always, write only on push (not on PRs from forks)
          cache-from: type=registry,ref=${{ steps.image.outputs.cache }}
          cache-to: >-
            ${{ github.event_name == 'push' &&
                format('type=registry,ref={0},mode=max', steps.image.outputs.cache)
                || '' }}

  # ─── Job 2: Build Flipper OS image ──────────────────────────────────────────
  #
  # Pulls the env image, runs the full build pipeline inside the container
  # (kernel → rootfs → ostree-commit → disk image), then runs automated tests.
  # Build output is mounted from the host so the .img survives container exit.
  build:
    name: Build Flipper OS · ${{ inputs.board || 'rock-4d' }}
    runs-on: ubuntu-latest
    needs: build-env
    timeout-minutes: 240
    permissions:
      contents: read
      packages: read
    env:
      BOARD: ${{ inputs.board || 'rock-4d' }}

    steps:
      # Standard runners have ~14 GB free. Remove unused pre-installed software
      # to make room for the Docker image (~6 GB) + build output (~6 GB).
      - name: Free disk space
        run: |
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/share/swift \
            /opt/hostedtoolcache/CodeQL \
            /opt/hostedtoolcache/Java_Temurin-Hotspot_jdk \
            /opt/hostedtoolcache/Ruby \
            /opt/hostedtoolcache/go
          sudo apt-get remove -y '^aspnetcore-.*' '^dotnet-.*' 'php.*' \
            '^mysql-.*' '^postgresql-.*' 2>/dev/null || true
          sudo apt-get autoremove -y
          sudo apt-get clean
          df -h

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull build environment image
        run: docker pull "${{ needs.build-env.outputs.image }}"

      - name: Show available disk space
        run: df -h

      # Register ARM64 QEMU handler in the host kernel's binfmt_misc.
      # Required for cross-arch chroot (mmdebstrap arm64 on amd64).
      # The container's setup_binfmt only enables an already-registered handler;
      # on a fresh runner no handler exists yet, so we need this host-level step.
      - name: Register ARM64 binfmt handler
        run: docker run --privileged --rm tonistiigi/binfmt --install arm64

      # Mount host directories so build artifacts survive container exit
      - name: Prepare output directories
        run: mkdir -p out/images out/ostree

      # Runs: build-kernel → build-rootfs → ostree-commit → build-image
      # --privileged is required for losetup, mount, chroot, and binfmt_misc
      - name: Build Flipper OS image
        run: |
          docker run --privileged \
            -v "$PWD/out/images:/root/flipper-one-dev/images" \
            -v "$PWD/out/ostree:/root/flipper-one-dev/ostree-work" \
            -e BOARD="${BOARD}" \
            "${{ needs.build-env.outputs.image }}" \
            build

      # Automated QEMU tests (non-interactive: boot smoke + profile system).
      # continue-on-error because:
      #   a) QEMU without KVM is slow and may time out on busy runners
      #   b) docker-entrypoint.sh 'test' exits 0 even on test failure
      #      (designed for interactive use); failures appear in the log
      - name: Run automated tests
        continue-on-error: true
        run: |
          docker run --privileged \
            -v "$PWD/out/images:/root/flipper-one-dev/images" \
            -e BOARD="${BOARD}" \
            "${{ needs.build-env.outputs.image }}" \
            test

      - name: Compress image
        run: |
          IMAGE="out/images/flipper-os-${BOARD}.img"
          if [ ! -f "$IMAGE" ]; then
            echo "ERROR: image not found: $IMAGE" >&2
            exit 1
          fi
          pigz -9 "$IMAGE"
          ls -lh out/images/

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: flipper-os-${{ env.BOARD }}-${{ github.sha }}
          path: out/images/flipper-os-${{ env.BOARD }}.img.gz
          retention-days: 14
          if-no-files-found: error
